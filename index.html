<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с Дедом Морозом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #0d2137 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Анимированный снег */
        .snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .snowflake {
            position: absolute;
            top: -10px;
            color: white;
            font-size: 1em;
            opacity: 0.8;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10px) rotate(0deg);
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        /* Контейнер приложения */
        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            position: relative;
            z-index: 2;
        }

        /* Экран приветствия */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .welcome-title {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8),
                         0 0 40px rgba(255, 215, 0, 0.6),
                         0 0 60px rgba(255, 215, 0, 0.4);
            animation: glow 2s ease-in-out infinite alternate;
            padding: 0 10px;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px rgba(255, 215, 0, 0.8),
                            0 0 40px rgba(255, 215, 0, 0.6),
                            0 0 60px rgba(255, 215, 0, 0.4);
            }
            to {
                text-shadow: 0 0 30px rgba(255, 215, 0, 1),
                            0 0 50px rgba(255, 215, 0, 0.8),
                            0 0 70px rgba(255, 215, 0, 0.6);
            }
        }

        .input-container {
            width: 100%;
            max-width: 350px;
            margin-bottom: 20px;
        }

        .name-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .name-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .name-input:focus {
            border-color: rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .continue-btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(196, 30, 58, 0.4);
        }

        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(196, 30, 58, 0.6);
        }

        .continue-btn:active {
            transform: translateY(0);
        }

        /* Экран чата пользователя */
        .chat-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 100%);
        }

        .chat-header {
            padding: 15px;
            background: rgba(10, 22, 40, 0.9);
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .back-to-list-btn {
            padding: 8px 15px;
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            color: #1a0a0a;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .back-to-list-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .chat-title {
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .logout-btn {
            padding: 8px 15px;
            background: rgba(196, 30, 58, 0.8);
            color: #fff;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(196, 30, 58, 1);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            position: relative;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #1a3a5c 0%, #0d2137 100%);
            color: #fff;
            border-bottom-right-radius: 5px;
        }

        .message.santa {
            align-self: flex-start;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            color: #fff;
            border-bottom-left-radius: 5px;
        }

        .message-time {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 5px;
            text-align: right;
        }

        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 1rem;
            padding: 2px 6px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .message:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: #fff;
        }

        .typing-indicator {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            align-self: flex-start;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .date-separator {
            text-align: center;
            padding: 15px 0;
            color: rgba(255, 215, 0, 0.8);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            margin: 10px 0;
        }

        .date-separator::before,
        .date-separator::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.3));
        }

        .date-separator::before {
            left: 10px;
        }

        .date-separator::after {
            right: 10px;
            transform: rotate(180deg);
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .chat-input-container {
            padding: 15px;
            background: rgba(10, 22, 40, 0.9);
            border-top: 2px solid rgba(255, 215, 0, 0.2);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .chat-input:focus {
            border-color: rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .send-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        /* Экран Деда Мороза */
        .santa-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: linear-gradient(135deg, #1a0a0a 0%, #3d1a1a 100%);
        }

        .santa-header {
            padding: 15px;
            background: rgba(26, 10, 10, 0.9);
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .santa-title {
            color: #ffd700;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .santa-users-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-item {
            padding: 15px;
            background: rgba(196, 30, 58, 0.3);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-item:hover {
            background: rgba(196, 30, 58, 0.5);
            transform: translateX(5px);
        }

        .user-item.active {
            background: rgba(196, 30, 58, 0.7);
        }

        .user-name {
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .user-last-seen {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .user-unread {
            background: #ffd700;
            color: #1a0a0a;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Адаптивность */
        @media (max-width: 480px) {
            .welcome-title {
                font-size: 1.5rem;
            }

            .message {
                max-width: 90%;
            }

            .chat-header,
            .santa-header {
                padding: 10px;
            }

            .chat-messages,
            .santa-users-list {
                padding: 10px;
            }
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 215, 0, 0.7);
        }
    </style>
</head>
<body>
    <div class="snow" id="snow"></div>

    <div class="app-container">
        <!-- Экран приветствия -->
        <div class="welcome-screen" id="welcomeScreen">
            <h1 class="welcome-title">Начни общение с Дедом Морозом прямо сейчас!</h1>
            <div class="input-container">
                <input type="text" class="name-input" id="nameInput" placeholder="Напиши своё имя" autocomplete="off">
            </div>
            <button class="continue-btn" id="continueBtn">Продолжить</button>
        </div>

        <!-- Экран чата пользователя -->
        <div class="chat-screen" id="chatScreen">
            <div class="chat-header">
                <div class="chat-title">Чат с Дедом Морозом</div>
                <button class="logout-btn" id="logoutBtn">Выйти</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="chatInput" placeholder="Напишите сообщение..." autocomplete="off">
                <button class="send-btn" id="sendBtn">Отправить</button>
            </div>
        </div>

        <!-- Экран Деда Мороза -->
        <div class="santa-screen" id="santaScreen">
            <div class="santa-header">
                <div class="santa-title">🎅 Панель Деда Мороза</div>
                <button class="logout-btn" id="santaLogoutBtn">Выйти</button>
            </div>
            <div class="santa-users-list" id="santaUsersList"></div>
        </div>

        <!-- Экран чата Деда Мороза с пользователем -->
        <div class="chat-screen" id="santaChatScreen">
            <div class="chat-header">
                <div class="chat-title" id="santaChatTitle">Чат с пользователем</div>
                <div class="header-buttons">
                    <button class="back-to-list-btn" id="backToListBtn">К списку чатов</button>
                    <button class="logout-btn" id="santaChatLogoutBtn">Выйти</button>
                </div>
            </div>
            <div class="chat-messages" id="santaChatMessages"></div>
            <div class="typing-indicator" id="santaTypingIndicator">
                <span></span><span></span><span></span>
            </div>
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="santaChatInput" placeholder="Напишите сообщение..." autocomplete="off">
                <button class="send-btn" id="santaSendBtn">Отправить</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getDatabase, ref, set, push, onValue, update, remove, child } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAu_wfaRhTsWNbsyFYmEigopqJck7ynxlU",
            authDomain: "messeger-0wo2h4.firebaseapp.com",
            databaseURL: "https://messeger-0wo2h4-default-rtdb.firebaseio.com",
            projectId: "messeger-0wo2h4",
            storageBucket: "messeger-0wo2h4.firebasestorage.app",
            messagingSenderId: "1057251395030",
            appId: "1:1057251395030:web:86f8f718ed938055e29077"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Глобальные переменные
        let currentUser = null;
        let isSanta = false;
        let selectedUser = null;
        let typingTimeout = null;

        // DOM элементы
        const welcomeScreen = document.getElementById('welcomeScreen');
        const chatScreen = document.getElementById('chatScreen');
        const santaScreen = document.getElementById('santaScreen');
        const santaChatScreen = document.getElementById('santaChatScreen');
        const nameInput = document.getElementById('nameInput');
        const continueBtn = document.getElementById('continueBtn');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const santaLogoutBtn = document.getElementById('santaLogoutBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const santaUsersList = document.getElementById('santaUsersList');
        const santaChatTitle = document.getElementById('santaChatTitle');
        const santaChatMessages = document.getElementById('santaChatMessages');
        const santaChatInput = document.getElementById('santaChatInput');
        const santaSendBtn = document.getElementById('santaSendBtn');
        const backToListBtn = document.getElementById('backToListBtn');
        const santaChatLogoutBtn = document.getElementById('santaChatLogoutBtn');
        const santaTypingIndicator = document.getElementById('santaTypingIndicator');

        // Создание снежинок
        function createSnowflakes() {
            const snow = document.getElementById('snow');
            for (let i = 0; i < 50; i++) {
                const snowflake = document.createElement('div');
                snowflake.className = 'snowflake';
                snowflake.innerHTML = '❄';
                snowflake.style.left = Math.random() * 100 + '%';
                snowflake.style.animationDuration = Math.random() * 3 + 2 + 's';
                snowflake.style.opacity = Math.random();
                snowflake.style.fontSize = Math.random() * 10 + 10 + 'px';
                snow.appendChild(snowflake);
            }
        }

        createSnowflakes();

        // Форматирование времени
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        // Форматирование даты для разделителя
        function formatDateForSeparator(timestamp) {
            const messageDate = new Date(timestamp);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            // Сбрасываем время для сравнения только дат
            messageDate.setHours(0, 0, 0, 0);
            today.setHours(0, 0, 0, 0);
            yesterday.setHours(0, 0, 0, 0);

            if (messageDate.getTime() === today.getTime()) {
                return 'Сегодня';
            } else if (messageDate.getTime() === yesterday.getTime()) {
                return 'Вчера';
            } else {
                return messageDate.toLocaleDateString('ru-RU', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                });
            }
        }

        // Отображение разделителя даты
        function displayDateSeparator(dateText) {
            const separator = document.createElement('div');
            separator.className = 'date-separator';
            separator.textContent = dateText;
            chatMessages.appendChild(separator);
        }

        // Отображение разделителя даты для Деда Мороза
        function displaySantaDateSeparator(dateText) {
            const separator = document.createElement('div');
            separator.className = 'date-separator';
            separator.textContent = dateText;
            santaChatMessages.appendChild(separator);
        }

        // Отображение сообщения для Деда Мороза
        function displaySantaMessage(message, key) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${message.sender === 'santa' ? 'santa' : 'user'}`;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerHTML = '×';
            deleteBtn.onclick = () => deleteSantaMessage(key);

            const text = document.createElement('div');
            text.textContent = message.text;

            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = formatTime(message.timestamp);

            messageDiv.appendChild(deleteBtn);
            messageDiv.appendChild(text);
            messageDiv.appendChild(time);

            // Добавляем долгое нажатие для Деда Мороза
            if (isSanta) {
                let pressTimer;
                let isLongPress = false;

                messageDiv.addEventListener('touchstart', (e) => {
                    isLongPress = false;
                    pressTimer = setTimeout(() => {
                        isLongPress = true;
                        showDeleteDialog(key);
                    }, 500);
                });

                messageDiv.addEventListener('touchend', () => {
                    clearTimeout(pressTimer);
                });

                messageDiv.addEventListener('touchmove', () => {
                    clearTimeout(pressTimer);
                });

                // Для десктопа используем правую кнопку мыши
                messageDiv.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    showDeleteDialog(key);
                });
            }

            santaChatMessages.appendChild(messageDiv);
        }

        // Прокрутка вниз для чата Деда Мороза
        function scrollToSantaBottom() {
            santaChatMessages.scrollTop = santaChatMessages.scrollHeight;
        }

        // Удаление сообщения для Деда Мороза
        function deleteSantaMessage(key) {
            if (!isSanta) {
                // Обычный пользователь может удалять только свои сообщения
                const messageRef = ref(db, `messages/${currentUser}/${key}`);
                onValue(messageRef, (snapshot) => {
                    const message = snapshot.val();
                    if (message && message.sender !== currentUser) {
                        alert('Вы можете удалять только свои сообщения');
                        return;
                    }
                    remove(messageRef);
                }, { onlyOnce: true });
            } else {
                // Дед Мороз может удалять любые сообщения
                remove(ref(db, `messages/${selectedUser}/${key}`));
            }
        }

        // Отправка сообщения Деда Мороза
        function sendSantaMessage() {
            const text = santaChatInput.value.trim();
            if (!text) return;

            const messageData = {
                text: text,
                sender: 'santa',
                timestamp: Date.now()
            };

            if (isSanta && selectedUser) {
                push(ref(db, `messages/${selectedUser}`), messageData);
            }

            santaChatInput.value = '';
        }

        // Обработчики событий для чата Деда Мороза
        backToListBtn.addEventListener('click', () => {
            showScreen(santaScreen);
            selectedUser = null;
        });

        santaChatLogoutBtn.addEventListener('click', () => {
            localStorage.removeItem('santaChatUserName');
            currentUser = null;
            isSanta = false;
            selectedUser = null;
            showScreen(welcomeScreen);
        });

        santaSendBtn.addEventListener('click', sendSantaMessage);

        santaChatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendSantaMessage();
            }
        });

        // Отслеживание ввода текста для индикатора печатания Деда Мороза
        santaChatInput.addEventListener('input', () => {
            if (isSanta && selectedUser) {
                set(ref(db, `typing/${selectedUser}/santa`), true);

                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    set(ref(db, `typing/${selectedUser}/santa`), false);
                }, 1000);
            }
        });

        // Форматирование времени последнего захода для Деда Мороза
        function formatLastSeen(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return 'только что';
            if (minutes < 60) return `${minutes} мин. назад`;
            if (hours < 24) return `${hours} ч. назад`;
            if (days < 7) return `${days} дн. назад`;

            const date = new Date(timestamp);
            return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        // Показать экран
        function showScreen(screen) {
            welcomeScreen.style.display = 'none';
            chatScreen.style.display = 'none';
            santaScreen.style.display = 'none';
            santaChatScreen.style.display = 'none';
            screen.style.display = 'flex';
        }

        // Проверка сохраненного имени пользователя при загрузке
        window.addEventListener('load', () => {
            const savedUserName = localStorage.getItem('santaChatUserName');
            if (savedUserName) {
                currentUser = savedUserName;
                isSanta = currentUser.toLowerCase() === 'дед мороз';

                if (isSanta) {
                    showScreen(santaScreen);
                    loadSantaUsers();
                } else {
                    showScreen(chatScreen);
                    loadUserChat();
                    updateUserLastSeen();
                }
            }
        });

        // Обработка входа
        continueBtn.addEventListener('click', () => {
            const name = nameInput.value.trim();
            if (!name) {
                alert('Пожалуйста, введите ваше имя');
                return;
            }

            currentUser = name;
            isSanta = name.toLowerCase() === 'дед мороз';

            // Сохраняем имя пользователя в localStorage
            localStorage.setItem('santaChatUserName', name);

            if (isSanta) {
                showScreen(santaScreen);
                loadSantaUsers();
            } else {
                showScreen(chatScreen);
                loadUserChat();
                updateUserLastSeen();
            }
        });

        // Обработка выхода
        logoutBtn.addEventListener('click', () => {
            // Удаляем сохраненное имя пользователя
            localStorage.removeItem('santaChatUserName');

            currentUser = null;
            isSanta = false;
            selectedUser = null;
            nameInput.value = '';
            document.querySelector('.chat-title').textContent = 'Чат с Дедом Морозом';
            showScreen(welcomeScreen);
        });

        santaLogoutBtn.addEventListener('click', () => {
            // Удаляем сохраненное имя пользователя
            localStorage.removeItem('santaChatUserName');

            currentUser = null;
            isSanta = false;
            selectedUser = null;
            nameInput.value = '';
            document.querySelector('.chat-title').textContent = 'Чат с Дедом Морозом';
            showScreen(welcomeScreen);
        });

        // Обновление времени последнего захода пользователя
        function updateUserLastSeen() {
            if (!currentUser || isSanta) return;
            set(ref(db, `users/${currentUser}/lastSeen`), Date.now());
        }

        // Загрузка чата пользователя
        function loadUserChat() {
            const messagesRef = ref(db, `messages/${currentUser}`);
            onValue(messagesRef, (snapshot) => {
                chatMessages.innerHTML = '';
                const messages = snapshot.val();
                if (messages) {
                    let lastDate = '';
                    const sortedMessages = Object.entries(messages).sort((a, b) => a[1].timestamp - b[1].timestamp);
                    sortedMessages.forEach(([key, message]) => {
                        const currentDate = formatDateForSeparator(message.timestamp);
                        if (currentDate !== lastDate) {
                            displayDateSeparator(currentDate);
                            lastDate = currentDate;
                        }
                        displayMessage(message, key);
                    });
                }
                scrollToBottom();
            });

            // Отслеживание статуса печатания Деда Мороза
            const typingRef = ref(db, `typing/${currentUser}/santa`);
            onValue(typingRef, (snapshot) => {
                const isTyping = snapshot.val();
                typingIndicator.style.display = isTyping ? 'block' : 'none';
                if (isTyping) {
                    scrollToBottom();
                }
            });
        }

        // Отображение сообщения
        function displayMessage(message, key) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${message.sender === 'santa' ? 'santa' : 'user'}`;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerHTML = '×';
            deleteBtn.onclick = () => deleteMessage(key);

            const text = document.createElement('div');
            text.textContent = message.text;

            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = formatTime(message.timestamp);

            messageDiv.appendChild(deleteBtn);
            messageDiv.appendChild(text);
            messageDiv.appendChild(time);

            // Добавляем долгое нажатие для Деда Мороза
            if (isSanta) {
                let pressTimer;
                let isLongPress = false;

                messageDiv.addEventListener('touchstart', (e) => {
                    isLongPress = false;
                    pressTimer = setTimeout(() => {
                        isLongPress = true;
                        showDeleteDialog(key);
                    }, 500);
                });

                messageDiv.addEventListener('touchend', () => {
                    clearTimeout(pressTimer);
                });

                messageDiv.addEventListener('touchmove', () => {
                    clearTimeout(pressTimer);
                });

                // Для десктопа используем правую кнопку мыши
                messageDiv.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    showDeleteDialog(key);
                });
            }

            chatMessages.appendChild(messageDiv);
        }

        // Диалог удаления сообщения
        function showDeleteDialog(messageKey) {
            const dialog = document.createElement('div');
            dialog.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.7);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
            `;

            const dialogContent = document.createElement('div');
            dialogContent.style.cssText = `
                background: linear-gradient(135deg, #1a0a0a 0%, #3d1a1a 100%);
                padding: 30px;
                border-radius: 20px;
                text-align: center;
                color: #fff;
                max-width: 300px;
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
                border: 2px solid rgba(255, 215, 0, 0.3);
            `;

            const title = document.createElement('h3');
            title.textContent = 'Удалить сообщение?';
            title.style.marginBottom = '20px';
            title.style.color = '#ffd700';

            const buttonsContainer = document.createElement('div');
            buttonsContainer.style.display = 'flex';
            buttonsContainer.style.gap = '15px';
            buttonsContainer.style.justifyContent = 'center';

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Удалить';
            deleteBtn.style.cssText = `
                padding: 12px 25px;
                background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
                color: #fff;
                border: none;
                border-radius: 25px;
                cursor: pointer;
                font-size: 1rem;
                transition: all 0.3s ease;
            `;

            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Отмена';
            cancelBtn.style.cssText = `
                padding: 12px 25px;
                background: rgba(255, 255, 255, 0.1);
                color: #fff;
                border: 2px solid rgba(255, 215, 0, 0.3);
                border-radius: 25px;
                cursor: pointer;
                font-size: 1rem;
                transition: all 0.3s ease;
            `;

            deleteBtn.addEventListener('click', () => {
                deleteMessage(messageKey);
                document.body.removeChild(dialog);
            });

            cancelBtn.addEventListener('click', () => {
                document.body.removeChild(dialog);
            });

            dialog.addEventListener('click', (e) => {
                if (e.target === dialog) {
                    document.body.removeChild(dialog);
                }
            });

            buttonsContainer.appendChild(deleteBtn);
            buttonsContainer.appendChild(cancelBtn);
            dialogContent.appendChild(title);
            dialogContent.appendChild(buttonsContainer);
            dialog.appendChild(dialogContent);
            document.body.appendChild(dialog);
        }

        // Удаление сообщения
        function deleteMessage(key) {
            if (!isSanta) {
                // Обычный пользователь может удалять только свои сообщения
                const messageRef = ref(db, `messages/${currentUser}/${key}`);
                onValue(messageRef, (snapshot) => {
                    const message = snapshot.val();
                    if (message && message.sender !== currentUser) {
                        alert('Вы можете удалять только свои сообщения');
                        return;
                    }
                    remove(messageRef);
                }, { onlyOnce: true });
            } else {
                // Дед Мороз может удалять любые сообщения
                remove(ref(db, `messages/${selectedUser}/${key}`));
            }
        }

        // Отправка сообщения
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            const messageData = {
                text: text,
                sender: isSanta ? 'santa' : currentUser,
                timestamp: Date.now()
            };

            if (isSanta && selectedUser) {
                push(ref(db, `messages/${selectedUser}`), messageData);
            } else if (!isSanta) {
                push(ref(db, `messages/${currentUser}`), messageData);
            }

            chatInput.value = '';
        }

        // Отслеживание ввода текста для индикатора печатания
        chatInput.addEventListener('input', () => {
            if (isSanta && selectedUser) {
                // Дед Мороз печатает
                set(ref(db, `typing/${selectedUser}/santa`), true);

                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    set(ref(db, `typing/${selectedUser}/santa`), false);
                }, 1000);
            } else if (!isSanta && currentUser) {
                // Пользователь печатает
                set(ref(db, `typing/${currentUser}/user`), true);

                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    set(ref(db, `typing/${currentUser}/user`), false);
                }, 1000);
            }
        });

        // Обработка нажатия Enter
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        // Прокрутка вниз
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Загрузка списка пользователей для Деда Мороза
        function loadSantaUsers() {
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                santaUsersList.innerHTML = '';
                const users = snapshot.val();
                if (users) {
                    Object.entries(users).forEach(([username, userData]) => {
                        displayUserItem(username, userData);
                    });
                }
            });

            // Отслеживание новых сообщений
            const messagesRef = ref(db, 'messages');
            onValue(messagesRef, (snapshot) => {
                const messages = snapshot.val();
                if (messages) {
                    Object.entries(messages).forEach(([username, userMessages]) => {
                        updateUnreadCount(username, userMessages);
                    });
                }
            });
        }

        // Отображение элемента пользователя
        function displayUserItem(username, userData) {
            const userItem = document.createElement('div');
            userItem.className = 'user-item';
            if (selectedUser === username) {
                userItem.classList.add('active');
            }

            const userInfo = document.createElement('div');
            userInfo.style.flex = '1';

            const userName = document.createElement('div');
            userName.className = 'user-name';
            userName.textContent = username;

            const userLastSeen = document.createElement('div');
            userLastSeen.className = 'user-last-seen';
            userLastSeen.textContent = `Был(а): ${formatLastSeen(userData.lastSeen)}`;

            userInfo.appendChild(userName);
            userInfo.appendChild(userLastSeen);

            const unreadBadge = document.createElement('div');
            unreadBadge.className = 'user-unread';
            unreadBadge.id = `unread-${username}`;
            unreadBadge.style.display = 'none';

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'user-delete-btn';
            deleteBtn.innerHTML = '🗑️';
            deleteBtn.style.background = 'none';
            deleteBtn.style.border = 'none';
            deleteBtn.style.cursor = 'pointer';
            deleteBtn.style.fontSize = '1.2rem';
            deleteBtn.style.padding = '5px 10px';
            deleteBtn.style.transition = 'transform 0.3s ease';
            deleteBtn.style.marginLeft = '10px';
            deleteBtn.title = 'Удалить пользователя';

            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm(`Вы уверены, что хотите удалить пользователя ${username} и все его сообщения?`)) {
                    deleteUser(username);
                }
            });

            deleteBtn.addEventListener('mouseenter', () => {
                deleteBtn.style.transform = 'scale(1.2)';
            });

            deleteBtn.addEventListener('mouseleave', () => {
                deleteBtn.style.transform = 'scale(1)';
            });

            userItem.appendChild(userInfo);
            userItem.appendChild(unreadBadge);
            userItem.appendChild(deleteBtn);

            userItem.addEventListener('click', () => {
                selectedUser = username;
                santaChatTitle.textContent = `Чат с ${username}`;
                showScreen(santaChatScreen);
                loadSantaChat(username);
            });

            santaUsersList.appendChild(userItem);
        }

        // Удаление пользователя
        function deleteUser(username) {
            // Удаляем пользователя из списка пользователей
            remove(ref(db, `users/${username}`));

            // Удаляем все сообщения пользователя
            remove(ref(db, `messages/${username}`));

            // Удаляем данные о печатании
            remove(ref(db, `typing/${username}`));
        }

        // Обновление количества непрочитанных сообщений
        function updateUnreadCount(username, messages) {
            const unreadBadge = document.getElementById(`unread-${username}`);
            if (!unreadBadge) return;

            let unreadCount = 0;
            Object.values(messages).forEach(message => {
                if (message.sender !== 'santa' && !message.read) {
                    unreadCount++;
                }
            });

            if (unreadCount > 0) {
                unreadBadge.textContent = unreadCount;
                unreadBadge.style.display = 'block';
            } else {
                unreadBadge.style.display = 'none';
            }
        }

        // Загрузка чата Деда Мороза с конкретным пользователем
        function loadSantaChat(username) {
            const messagesRef = ref(db, `messages/${username}`);
            onValue(messagesRef, (snapshot) => {
                santaChatMessages.innerHTML = '';
                const messages = snapshot.val();
                if (messages) {
                    let lastDate = '';
                    const sortedMessages = Object.entries(messages).sort((a, b) => a[1].timestamp - b[1].timestamp);
                    sortedMessages.forEach(([key, message]) => {
                        const currentDate = formatDateForSeparator(message.timestamp);
                        if (currentDate !== lastDate) {
                            displaySantaDateSeparator(currentDate);
                            lastDate = currentDate;
                        }
                        displaySantaMessage(message, key);
                    });
                }
                scrollToSantaBottom();
            });

            // Помечаем сообщения как прочитанные один раз при открытии чата
            const messagesRefOnce = ref(db, `messages/${username}`);
            onValue(messagesRefOnce, (snapshot) => {
                const messages = snapshot.val();
                if (messages) {
                    Object.entries(messages).forEach(([key, message]) => {
                        if (message.sender !== 'santa' && !message.read) {
                            update(ref(db, `messages/${username}/${key}`), { read: true });
                        }
                    });
                }
            }, { onlyOnce: true });

            // Отслеживание статуса печатания пользователя
            const typingRef = ref(db, `typing/${username}/user`);
            onValue(typingRef, (snapshot) => {
                const isTyping = snapshot.val();
                if (isTyping) {
                    santaTypingIndicator.innerHTML = `${username} печатает...`;
                    santaTypingIndicator.style.display = 'block';
                    scrollToSantaBottom();
                } else {
                    santaTypingIndicator.style.display = 'none';
                }
            });
        }

        // Обработка закрытия страницы
        window.addEventListener('beforeunload', () => {
            if (currentUser && !isSanta) {
                set(ref(db, `users/${currentUser}/lastSeen`), Date.now());
            }
        });
    </script>
</body>
</html>
